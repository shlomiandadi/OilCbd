# Netlify — Next.js App Router
# https://docs.netlify.com/frameworks/next-js/overview/
#
# חובה ב-UI: Environment variables → Production
#   DATABASE_URL — Neon pooled (עם ‎-pooler‎) לאפליקציה
#   אופציונלי למיגרציה (אחד מספיק): DIRECT_URL או DATABASE_URL_UNPOOLED (Neon מגדיר לעתים אוטומטית)
#   NEXT_PUBLIC_SITE_URL = https://YOUR-SITE.netlify.app

[build]
  # מיגרציה עם URL ישיר אם קיים; אחרת אותו DATABASE_URL (ראו scripts/netlify-build.sh)
  command = "sh scripts/netlify-build.sh"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # התאימו לגרסת Node בפרויקט (Prisma 5 + Next 16)
  NODE_VERSION = "20"
