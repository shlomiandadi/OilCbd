# Netlify — Next.js App Router
# https://docs.netlify.com/frameworks/next-js/overview/
#
# חובה ב-UI: Environment variables → Production
#   DATABASE_URL   — Neon "Pooled" (כתובת עם ‎-pooler‎)
#   DIRECT_URL     — Neon "Direct" (בלי pooler) — חובה ל־prisma migrate deploy; מונע P1002 advisory lock
#   NEXT_PUBLIC_SITE_URL = https://YOUR-SITE.netlify.app

[build]
  # מיגרציות יוצרות את טבלאות ה-CMS (content_page, blog_post וכו׳) — דורש DATABASE_URL גם בשלב Build
  command = "npx prisma migrate deploy && npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # התאימו לגרסת Node בפרויקט (Prisma 5 + Next 16)
  NODE_VERSION = "20"
