# Netlify — Next.js App Router
# https://docs.netlify.com/frameworks/next-js/overview/
#
# חובה ב-UI: Environment variables → Production
#   DATABASE_URL       (מחרוזת Neon/Postgres, ללא מרכאות)
#   NEXT_PUBLIC_SITE_URL = https://YOUR-SITE.netlify.app

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # התאימו לגרסת Node בפרויקט (Prisma 5 + Next 16)
  NODE_VERSION = "20"
